worker_processes  1;

events {
  worker_connections  1024;
}

http {
  proxy_cache_path /var/cache/nginx/jscache levels=1:2 keys_zone=jscache:10m max_size=100m inactive=60m;

  resolver 1.1.1.1 8.8.8.8 valid=60s ipv6=off;

  server {
    listen 8080;
    server_name   _;

    root   /usr/share/nginx/html;
    index  index.html index.htm;
    include /etc/nginx/mime.types;

    brotli on;
    brotli_static on;
    brotli_comp_level 6;
    brotli_min_length 1000;
    brotli_types text/plain text/css text/xml application/javascript application/json application/xml application/rss+xml application/atom+xml image/svg+xml;

    gzip on;
    gzip_static on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml application/rss+xml application/atom+xml image/svg+xml;

    error_page 404 /404.html;
    location = /404.html {
      root /usr/share/nginx/html;
      internal;
    }

    location = /p.js {
      set $plausible "plausible.johnprutton.dev";
      proxy_pass https://$plausible/js/script.outbound-links.tagged-events.js;
      proxy_set_header Host $plausible;
      proxy_ssl_server_name on;
      proxy_ssl_name $plausible;
      proxy_buffering on;
      proxy_cache jscache;
      proxy_cache_valid 200 5m;
      proxy_cache_use_stale updating error timeout invalid_header http_500;

      add_header X-Cache $upstream_cache_status;
    }

    location = /api/event {
      set $plausible "plausible.johnprutton.dev";
      proxy_pass https://$plausible/api/event;
      proxy_set_header Host $plausible;
      proxy_ssl_server_name on;
      proxy_ssl_name $plausible;
      proxy_buffering on;
      proxy_http_version 1.1;

      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
    }

    location / {
      try_files $uri $uri/index.html =404;
    }
  }
}
